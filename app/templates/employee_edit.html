{% include "hr_navbar.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Employee</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F4F6F8}
.content{padding:1.5rem;max-width:650px;margin:0 auto}
.card{background:#fff;border:1px solid #E8ECF0;border-radius:10px;padding:1.5rem}
.card-title{font-size:16px;font-weight:700;color:#1B3A6B;margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:#4B5563;text-transform:uppercase;letter-spacing:0.04em}
.field input,.field select{font-size:13px;padding:8px 12px;border:1px solid #D1D5DB;border-radius:7px;background:#fff;width:100%}
.field input:focus,.field select:focus{outline:none;border-color:#1B3A6B}
.btn-row{display:flex;gap:10px;margin-top:1.25rem;justify-content:flex-end}
.btn{font-size:13px;font-weight:600;padding:8px 20px;border-radius:7px;cursor:pointer;border:1px solid #D1D5DB;text-decoration:none}
.btn-primary{background:#1B3A6B;color:#fff;border-color:#1B3A6B}
.btn-secondary{background:#fff;color:#374151}
</style>
</head>
<body>
<div class="content">
  <div class="card">
    <div class="card-title">✏️ Edit Employee</div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-grid">
        {% for field in form %}
        <div class="field">
          <label>{{ field.label }}</label>{{ field }}
        </div>
        {% endfor %}
      </div>
      <div class="btn-row">
        <a href="{% url 'employee' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Update Employee</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
