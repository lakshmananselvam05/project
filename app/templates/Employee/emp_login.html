<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1B3A6B 0%,#0A7EA4 100%);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:14px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.logo{text-align:center;margin-bottom:1.5rem}
.logo-icon{font-size:40px}
.card-title{font-size:22px;font-weight:700;color:#1B3A6B;text-align:center;margin-bottom:0.25rem}
.card-sub{font-size:13px;color:#6B7280;text-align:center;margin-bottom:1.75rem}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:11px;font-weight:600;color:#4B5563;text-transform:uppercase;letter-spacing:0.04em}
.field input{font-size:14px;padding:10px 14px;border:1.5px solid #D1D5DB;border-radius:8px;background:#fff;color:#1a1a2e;width:100%}
.field input:focus{outline:none;border-color:#1B3A6B;box-shadow:0 0 0 3px rgba(27,58,107,0.1)}
.btn{width:100%;font-size:14px;font-weight:700;padding:11px;border-radius:8px;cursor:pointer;border:none;background:#1B3A6B;color:#fff;margin-top:4px;letter-spacing:0.03em}
.btn:hover{background:#163160}
.error-msg{background:#FCEBEB;color:#A32D2D;font-size:13px;padding:10px 14px;border-radius:7px;margin-bottom:14px;border:1px solid #F09595}
.signup-link{text-align:center;font-size:12px;color:#6B7280;margin-top:1.25rem}
.signup-link a{color:#1B3A6B;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="logo-icon">🏢</span></div>
  <div class="card-title">HR Management</div>
  <div class="card-sub">Sign in to your account</div>
  {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autofocus required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn">Login →</button>
  </form>
  <div class="signup-link">New here? <a href="{% url 'create' %}">Create Account</a></div>
</div>
</body>
</html>
