<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#F4F6F8;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border:1px solid #E8ECF0;border-radius:12px;padding:2rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.07)}
.card-title{font-size:20px;font-weight:700;color:#1B3A6B;margin-bottom:0.25rem;text-align:center}
.card-sub{font-size:13px;color:#6B7280;text-align:center;margin-bottom:1.5rem}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:#4B5563;text-transform:uppercase;letter-spacing:0.04em}
.field input,.field select{font-size:13px;padding:9px 12px;border:1px solid #D1D5DB;border-radius:7px;background:#fff;color:#1a1a2e;width:100%}
.field input:focus{outline:none;border-color:#1B3A6B;box-shadow:0 0 0 3px rgba(27,58,107,0.08)}
.errorlist{color:#A32D2D;font-size:12px;list-style:none;margin-top:2px}
.btn{width:100%;font-size:13px;font-weight:600;padding:10px;border-radius:7px;cursor:pointer;border:none;background:#1B3A6B;color:#fff;margin-top:8px}
.btn:hover{background:#163160}
.login-link{text-align:center;font-size:12px;color:#6B7280;margin-top:1rem}
.login-link a{color:#1B3A6B;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="card-title">🏢 HR System</div>
  <div class="card-sub">Create your account</div>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="field">
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
        <ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>
      {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn">Create Account</button>
  </form>
  <div class="login-link">Already have account? <a href="{% url 'employee-login' %}">Login →</a></div>
</div>
</body>
</html>
